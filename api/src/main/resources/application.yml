spring:
  application:
    name: api

  # 개발용 H2 인메모리 DB (PostgreSQL 전환 시 datasource만 교체)
  datasource:
    url: jdbc:h2:mem:gn;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  h2:
    console:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
