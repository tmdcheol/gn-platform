openapi: 3.0.3
info:
  title: GN Platform - Member API
  description: 회원(Member) 기본 CRUD API
  version: 0.0.1
servers:
  - url: http://localhost:8080
    description: 로컬 개발 서버

tags:
  - name: Member
    description: 회원 관리

paths:
  /api/members:
    get:
      tags: [Member]
      summary: 회원 목록 조회
      operationId: findAllMembers
      responses:
        '200':
          description: 회원 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MemberResponse'
    post:
      tags: [Member]
      summary: 회원 생성
      operationId: createMember
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberRequest'
      responses:
        '201':
          description: 생성된 회원
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/members/{id}:
    parameters:
      - $ref: '#/components/parameters/MemberId'
    get:
      tags: [Member]
      summary: 회원 단건 조회
      operationId: findMemberById
      responses:
        '200':
          description: 회원 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Member]
      summary: 회원 정보 수정 (이름/비밀번호)
      operationId: updateMember
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberRequest'
      responses:
        '200':
          description: 수정된 회원
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Member]
      summary: 회원 삭제
      operationId: deleteMember
      responses:
        '204':
          description: 삭제 완료 (본문 없음)
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    MemberId:
      name: id
      in: path
      required: true
      description: 회원 식별자
      schema:
        type: integer
        format: int64
        example: 1

  schemas:
    MemberRequest:
      type: object
      required: [email, name, password]
      properties:
        email:
          type: string
          format: email
          description: 이메일 (고유). 수정 시에는 무시된다.
          example: hong@example.com
        name:
          type: string
          description: 이름
          example: 홍길동
        password:
          type: string
          minLength: 8
          description: 비밀번호 (8자 이상)
          example: password1

    MemberResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        email:
          type: string
          format: email
          example: hong@example.com
        name:
          type: string
          example: 홍길동
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: 입력값 검증에 실패했습니다.
        errors:
          type: object
          additionalProperties:
            type: string
          description: 필드별 검증 오류 메시지 (검증 실패 시에만 포함)
          example:
            email: 이메일 형식이 올바르지 않습니다.

  responses:
    ValidationError:
      description: 입력값 검증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 회원을 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: 이미 사용 중인 이메일
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
